name: Build Android APK
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Clean and Organize Structure
      run: |
        mkdir -p app/src/main/java/com/example
        mkdir -p app/src/main/res/values

        # ترتيب بقية الملفات البرمجية تلقائياً داخل المجلدات
        mv *.kt app/src/main/java/com/example/ 2>/dev/null || true
        mv strings.xml app/src/main/res/values/ 2>/dev/null || true

    - name: Build APK with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KaraokeStudioAPK
        path: "**/build/outputs/apk/debug/*.apk"
